<h2 class="sr-only">Sprint plan para alocação de produtos por parceiro no ELLAN LAB — 6 sprints cobrindo gaps de seed data, catálogo de produtos, engine de alocação de slots, gestão de inventário, pickup/release, notificações e settlement.</h2>

<div class="board">
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>
</div>

<script>
const sprints = [
  {
    id: 0,
    label: 'Overview',
    title: 'Visão geral do projeto',
    duration: '',
    desc: 'Diagnóstico dos gaps e mapa de implementação para atingir nível Amazon/InPost.',
    type: 'overview'
  },
  {
    id: 1,
    label: 'Sprint 0',
    title: 'Fundação & Seed Data',
    duration: '1 semana',
    desc: 'O schema está completo mas vazio. Nenhum locker tem slots definidos, nenhum parceiro está vinculado a nenhum locker. Sem isso, zero alocação é possível.',
    tasks: [
      {
        title: 'Definir e seedar locker_slot_configs para os 13 lockers',
        sub: 'Cada locker tem 24 slots — distribuir XS(6), S(8), M(6), L(4). Lockers refrigerados recebem slots menores para cold pack.',
        type: 'SEED',
        badge: 'b-red',
        priority: 'BLOQUEADOR',
        tables: ['locker_slot_configs','locker_slots'],
        detail: {
          desc: 'Os 13 lockers existentes têm slots_count=24 mas nenhum slot físico registrado. Sem locker_slot_configs não há tamanho disponível para o algoritmo de alocação.',
          code: `-- Seed locker_slot_configs (exemplo para SP-OSASCO-CENTRO-LK-001)
INSERT INTO locker_slot_configs 
  (locker_id, slot_size, slot_count, width_mm, height_mm, depth_mm, max_weight_g)
VALUES
  ('SP-OSASCO-CENTRO-LK-001', 'XS', 6, 150, 200, 150, 2000),
  ('SP-OSASCO-CENTRO-LK-001', 'S',  8, 250, 300, 200, 5000),
  ('SP-OSASCO-CENTRO-LK-001', 'M',  6, 350, 400, 300, 10000),
  ('SP-OSASCO-CENTRO-LK-001', 'L',  4, 450, 500, 400, 20000);

-- Depois materializar os slots físicos em locker_slots
INSERT INTO locker_slots (id, locker_id, slot_label, slot_size, status)
SELECT gen_random_uuid(), locker_id,
  slot_size || '-' || gs AS slot_label,
  slot_size, 'AVAILABLE'
FROM locker_slot_configs, generate_series(1, slot_count) gs
WHERE locker_id = 'SP-OSASCO-CENTRO-LK-001';`,
          flow: ['locker_slot_configs', '→', 'locker_slots (AVAILABLE x N)']
        }
      },
      {
        title: 'Seedar ecommerce_partners e logistics_partners',
        sub: 'OP-ELLAN-001 e OP-PHARMA-001 referenciam operators mas não existem como ecommerce_partners. Criar registros base com tier, revenue_share, SLA.',
        type: 'SEED',
        badge: 'b-red',
        priority: 'BLOQUEADOR',
        tables: ['ecommerce_partners','logistics_partners','partner_sla_agreements'],
        detail: {
          desc: 'Os lockers referem operator_id = "OP-ELLAN-001" mas não há registro em nenhuma tabela de parceiros. Todos os flows de partner_service_areas dependem disso.',
          code: `INSERT INTO ecommerce_partners
  (id, name, code, integration_type, revenue_share_pct, country, tier, status)
VALUES
  ('OP-ELLAN-001', 'Ellan Operações', 'ELLAN', 'DIRECT', 0.15, 'BR', 'PREMIUM', 'ACTIVE'),
  ('OP-PHARMA-001', 'Rede Farmácias', 'PHARMA', 'WEBHOOK', 0.12, 'PT', 'STANDARD', 'ACTIVE');

-- SLA default por parceiro
INSERT INTO partner_sla_agreements
  (id, partner_id, partner_type, country, sla_pickup_hours, sla_return_hours, valid_from, is_active)
VALUES
  (gen_random_uuid(), 'OP-ELLAN-001', 'ECOMMERCE', 'BR', 72, 24, CURRENT_DATE, true),
  (gen_random_uuid(), 'OP-PHARMA-001', 'ECOMMERCE', 'PT', 48, 24, CURRENT_DATE, true);`,
          flow: ['ecommerce_partners', '→', 'partner_sla_agreements', '→', 'partner_service_areas']
        }
      },
      {
        title: 'Seedar partner_service_areas (parceiro ↔ locker)',
        sub: 'Define quais parceiros atendem quais lockers, com prioridade e exclusividade. É o "roteador" de onde produtos de cada parceiro podem aparecer.',
        type: 'SEED',
        badge: 'b-red',
        priority: 'BLOQUEADOR',
        tables: ['partner_service_areas'],
        detail: {
          desc: 'Sem partner_service_areas o sistema não sabe para qual locker um parceiro pode enviar produtos. É o mapeamento central da alocação geográfica.',
          code: `-- ELLAN serve todos os lockers BR com prioridade 100
INSERT INTO partner_service_areas
  (id, partner_id, partner_type, locker_id, priority, exclusive, valid_from, is_active)
SELECT gen_random_uuid(), 'OP-ELLAN-001', 'ECOMMERCE', id, 100, false, CURRENT_DATE, true
FROM lockers WHERE country = 'BR' AND active = true;

-- PHARMA serve apenas o locker de Lisboa (exclusivo)
INSERT INTO partner_service_areas
  (id, partner_id, partner_type, locker_id, priority, exclusive, valid_from, is_active)
VALUES
  (gen_random_uuid(), 'OP-PHARMA-001', 'ECOMMERCE',
   'PT-LISBOA-PHARMA-LK-001', 200, true, CURRENT_DATE, true);`,
          flow: ['ecommerce_partners', '→', 'partner_service_areas', '→', 'lockers']
        }
      },
      {
        title: 'Seedar product_locker_configs por categoria e locker',
        sub: 'Define o que pode entrar em cada locker: medicamentos só em lockers com security_level ENHANCED, refrigerados só em lockers REFRIGERATED.',
        type: 'SEED',
        badge: 'b-amber',
        priority: 'ALTO',
        tables: ['product_locker_configs'],
        detail: {
          desc: 'O algoritmo de elegibilidade de produto usa product_locker_configs. Sem isso qualquer produto seria aceito em qualquer locker — violando temperatura e segurança.',
          code: `-- Lockers AMBIENT aceitam categorias gerais
INSERT INTO product_locker_configs
  (locker_id, category, allowed, temperature_zone, max_weight_g)
SELECT id, 'ELETRONICOS', true, 'AMBIENT', 5000 FROM lockers
WHERE temperature_zone = 'AMBIENT' AND active = true;

-- Locker refrigerado: somente alimentos/farmácia fria
INSERT INTO product_locker_configs
  (locker_id, category, allowed, temperature_zone, max_weight_g)
VALUES
  ('SP-VILAOLIMPIA-FOOD-LK-001', 'ALIMENTOS', true, 'REFRIGERATED', 3000),
  ('SP-VILAOLIMPIA-FOOD-LK-001', 'COSMETICOS', false, 'REFRIGERATED', 0);

-- Locker ENHANCED security: farmácia e alto valor
INSERT INTO product_locker_configs
  (locker_id, category, allowed, temperature_zone, requires_id_check)
VALUES
  ('PT-LISBOA-PHARMA-LK-001', 'MEDICAMENTOS', true, 'AMBIENT', true),
  ('PT-LISBOA-PHARMA-LK-001', 'FARMACIA_GERAL', true, 'AMBIENT', false);`,
          flow: ['product_categories', '→', 'product_locker_configs', '→', 'slot allocation engine']
        }
      }
    ]
  },
  {
    id: 2,
    label: 'Sprint 1',
    title: 'Catálogo de Produtos por Parceiro',
    duration: '2 semanas',
    desc: 'API para parceiros registrarem seus produtos com dimensões e metadados. O sistema valida se o produto é elegível para lockers do parceiro antes de ativar.',
    tasks: [
      {
        title: 'POST /v1/partner/products — registro de produto',
        sub: 'Parceiro envia SKU, dimensões (mm), peso, categoria, temperatura. Sistema valida contra product_locker_configs antes de salvar como DRAFT.',
        type: 'API',
        badge: 'b-blue',
        priority: 'ALTO',
        tables: ['products','product_categories','product_status_history'],
        detail: {
          desc: 'Produto começa em status=DRAFT. Só é ativado após validação editorial e elegibilidade dimensional contra pelo menos um locker do parceiro.',
          code: `POST /v1/partner/{partner_id}/products
{
  "id": "SKU-ELLAN-CAFE-001",
  "name": "Café Torrado Premium 250g",
  "category_id": "ALIMENTOS",
  "amount_cents": 2490,
  "currency": "BRL",
  "width_mm": 120, "height_mm": 180, "depth_mm": 60,
  "weight_g": 280,
  "is_fragile": false, "is_hazardous": false
}

-- Engine valida: produto cabe em algum slot do parceiro?
SELECT lsc.slot_size FROM locker_slot_configs lsc
JOIN partner_service_areas psa ON psa.locker_id = lsc.locker_id
WHERE psa.partner_id = :partner_id
  AND lsc.width_mm >= :width AND lsc.height_mm >= :height
  AND lsc.depth_mm >= :depth AND lsc.max_weight_g >= :weight_g
LIMIT 1;  -- se vazio → rejeitar`,
          flow: ['POST product', '→', 'products (DRAFT)', '→', 'validate dimensions', '→', 'product_status_history']
        }
      },
      {
        title: 'POST /v1/partner/products/{id}/barcodes',
        sub: 'Registro de EAN13, GTIN14, QR por SKU. Permite scan no kiosk e validação no inbound (carrier_payload_json). Suporta múltiplos barcodes por SKU.',
        type: 'API',
        badge: 'b-blue',
        priority: 'MÉDIO',
        tables: ['product_barcodes'],
        detail: {
          desc: 'Necessário para scan físico no locker kiosk e para matching com inbound_deliveries.barcode enviado pela transportadora.',
          code: `POST /v1/partner/products/{sku_id}/barcodes
[
  {"barcode_type": "EAN13", "barcode_value": "7896039081014", "is_primary": true},
  {"barcode_type": "QR",    "barcode_value": "https://ellan.io/p/SKU-001", "is_primary": false}
]`,
          flow: ['product_barcodes', '→', 'inbound matching', '→', 'kiosk scan']
        }
      },
      {
        title: 'GET /v1/partner/lockers/{id}/eligible-products',
        sub: 'Retorna quais SKUs do parceiro são elegíveis para um locker específico, com slot_size sugerido para cada um. Base para a UI de reabastecimento.',
        type: 'API',
        badge: 'b-blue',
        priority: 'MÉDIO',
        tables: ['products','product_locker_configs','locker_slot_configs'],
        detail: {
          desc: 'Cruza dimensões do produto com slots disponíveis do locker e regras de categoria. Retorna slot_size recomendado para cada SKU.',
          code: `GET /v1/partner/lockers/SP-OSASCO-CENTRO-LK-001/eligible-products?partner_id=OP-ELLAN-001

-- Query
SELECT p.id, p.name, lsc.slot_size AS recommended_slot_size
FROM products p
JOIN product_locker_configs plc ON plc.category = p.category_id
  AND plc.locker_id = :locker_id AND plc.allowed = true
JOIN locker_slot_configs lsc ON lsc.locker_id = :locker_id
  AND lsc.width_mm  >= p.width_mm
  AND lsc.height_mm >= p.height_mm
  AND lsc.depth_mm  >= p.depth_mm
  AND lsc.max_weight_g >= p.weight_g
WHERE p.status = 'ACTIVE'
ORDER BY lsc.slot_size ASC;`,
          flow: ['products', '→', 'product_locker_configs', '→', 'locker_slot_configs', '→', 'elegíveis']
        }
      },
      {
        title: 'PATCH /v1/admin/products/{id}/status + fiscal config',
        sub: 'Admin aprova produto (DRAFT→ACTIVE) e preenche product_fiscal_config com NCM, CST, CFOP. Obrigatório para emissão de NF no Brasil.',
        type: 'ADMIN',
        badge: 'b-gray',
        priority: 'MÉDIO',
        tables: ['products','product_status_history','product_fiscal_config'],
        detail: {
          desc: 'Separar aprovação de produto (compliance editorial) de configuração fiscal (requisito legal BR/PT). Ambos bloqueiam produto de entrar em produção.',
          code: `PATCH /v1/admin/products/{sku_id}/status
{ "status": "ACTIVE", "reason": "Revisão aprovada" }

-- Fiscal obrigatório para BR
INSERT INTO product_fiscal_config
  (sku_id, ncm_code, icms_cst, pis_cst, cofins_cst, cfop, is_active)
VALUES
  ('SKU-ELLAN-CAFE-001', '09011100', '060', '01', '01', '5102', true);`,
          flow: ['DRAFT', '→', 'admin review', '→', 'ACTIVE', '→', 'product_fiscal_config']
        }
      }
    ]
  },
  {
    id: 3,
    label: 'Sprint 2',
    title: 'Engine de Alocação de Slots',
    duration: '2 semanas',
    desc: 'O coração do sistema. Quando um parceiro envia um produto/pacote, qual slot físico recebe? Dois flows: Retail (estoque pré-carregado) e PUDO (entrega de carrier).',
    tasks: [
      {
        title: 'Algoritmo de seleção de slot (slot picker)',
        sub: 'Dado produto + locker → encontrar melhor slot AVAILABLE. Critérios: size fit → temperatura → segurança → menor tempo ocupado anteriormente.',
        type: 'ENGINE',
        badge: 'b-amber',
        priority: 'CRÍTICO',
        tables: ['locker_slots','locker_slot_configs','product_locker_configs'],
        detail: {
          desc: 'SELECT com ranking multi-critério. Deve ser atômico (SELECT FOR UPDATE SKIP LOCKED) para evitar dupla alocação em picos de carga — requisito Amazon-grade.',
          code: `-- Slot picker atômico (SELECT FOR UPDATE SKIP LOCKED)
WITH best_slot AS (
  SELECT ls.id, ls.slot_size
  FROM locker_slots ls
  JOIN locker_slot_configs lsc
    ON lsc.locker_id = ls.locker_id AND lsc.slot_size = ls.slot_size
  JOIN product_locker_configs plc
    ON plc.locker_id = ls.locker_id
  WHERE ls.locker_id    = :locker_id
    AND ls.status       = 'AVAILABLE'
    AND lsc.width_mm   >= :product_width_mm
    AND lsc.height_mm  >= :product_height_mm
    AND lsc.depth_mm   >= :product_depth_mm
    AND lsc.max_weight_g >= :product_weight_g
    AND plc.category   = :product_category
    AND plc.allowed    = true
  ORDER BY
    lsc.slot_size ASC,       -- menor slot que cabe (evita desperdício)
    ls.last_opened_at ASC NULLS FIRST  -- slot menos usado primeiro
  LIMIT 1
  FOR UPDATE SKIP LOCKED     -- concurrency safe
)
UPDATE locker_slots
SET status = 'OCCUPIED', occupied_since = now()

function renderTabs() {
  const c = document.getElementById('tabs');
  c.innerHTML = sprints.map(s => `
    <button class="tab ${s.id === currentSprint ? 'active' : ''}" onclick="selectSprint(${s.id})">
      ${s.label}
    </button>
  `).join('');
}

function selectSprint(id) {
  currentSprint = id;
  selectedTask = null;
  renderTabs();
  renderContent();
}

function selectTask(idx) {
  selectedTask = selectedTask === idx ? null : idx;
  renderContent();
}

function setExecutivePriorityFilter(next) {
  executivePriorityFilter = String(next || 'ALL').toUpperCase();
  selectedTask = null;
  renderContent();
}

function toggleExecutiveOnlyHigh() {
  executiveOnlyHigh = !executiveOnlyHigh;
  selectedTask = null;
  renderContent();
}

        <div class="section-label" style="margin-top:14px">Estados de alocação (allocationstate)</div>
        <div class="flow-row" style="flex-wrap:wrap;gap:4px">
          ${['RESERVED_PENDING_PAYMENT','RESERVED_PAID_PENDING_PICKUP','OPENED_FOR_PICKUP','PICKED_UP','EXPIRED','RELEASED','CANCELLED','MAINTENANCE'].map(s => `<span class="alloc-state">${s}</span>`).join('')}
        </div>
      </div>
    `;
    return;
  }

  const tasks = (s.tasks || []).filter((t) => {
    const priorityText = String(t.priority || '').toUpperCase();
    const impact = resolveCustomerImpact(t);
    const risk = resolveOperationalRisk(t);
    const priorityMatches =
      executivePriorityFilter === 'ALL' ||
      priorityText.includes(executivePriorityFilter);
    const highMatches = !executiveOnlyHigh || impact === 'ALTO' || risk === 'ALTO';
    return priorityMatches && highMatches;
  });
  const totalFiltered = tasks.length;
  const totalHighImpact = tasks.filter((t) => resolveCustomerImpact(t) === 'ALTO').length;
  const totalHighRisk = tasks.filter((t) => resolveOperationalRisk(t) === 'ALTO').length;
  const highImpactPct = totalFiltered > 0 ? Math.round((totalHighImpact / totalFiltered) * 100) : 0;
  const highRiskPct = totalFiltered > 0 ? Math.round((totalHighRisk / totalFiltered) * 100) : 0;
  const showTrendCard = Number(s.id) === 6;
  const taskHtml = tasks.map((t, i) => {
    const sel = selectedTask === i;
    const impact = resolveCustomerImpact(t);
    const risk = resolveOperationalRisk(t);
    const wcag = resolveWcagConformance(t);
    return `
      <div class="task ${sel ? 'selected' : ''}" onclick="selectTask(${i})">
        <div class="task-left">
          <div class="task-title">${t.title}</div>
          <div class="task-sub">${t.sub}</div>
          <div class="quality-row">
            <span class="quality-chip ${impact === 'ALTO' ? 'q-impact-high' : ''}">Impacto cliente: ${impact}</span>
            <span class="quality-chip ${risk === 'ALTO' ? 'q-risk-high' : ''}">Risco operacional: ${risk}</span>
            <span class="quality-chip q-wcag-aa">WCAG: ${wcag}</span>
          </div>
          <div class="tables-used">
            ${t.tables.map(tb => `<span class="tbl">${tb}</span>`).join('')}
          </div>
        </div>
        <div class="task-right">
          <span class="badge ${t.badge}">${t.priority}</span>
          <span class="badge b-gray">${t.type}</span>
        </div>
      </div>
      ${sel ? `<div class="detail-panel show">
        <div class="section-label" style="margin-top:0">Contexto</div>
        <p style="font-size:13px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:10px">${t.detail.desc}</p>
        <div class="section-label">Gates de qualidade</div>
        <div class="quality-row" style="margin-top:0;margin-bottom:8px">
          <span class="quality-chip ${impact === 'ALTO' ? 'q-impact-high' : ''}">Impacto no cliente: ${impact}</span>
          <span class="quality-chip ${risk === 'ALTO' ? 'q-risk-high' : ''}">Risco operacional: ${risk}</span>
          <span class="quality-chip q-wcag-aa">Conformidade: ${wcag}</span>
        </div>
        <div class="section-label">SQL / Exemplo de implementação</div>
        <div class="code-block">${escHtml(t.detail.code)}</div>
        <div class="section-label" style="margin-top:10px">Flow de dados</div>
        <div class="flow-row">
          ${t.detail.flow.map(f => f === '→' ? `<span class="flow-arr">→</span>` : `<span class="flow-node">${f}</span>`).join('')}
        </div>
      </div>` : ''}
    `;
  }).join('');

  c.innerHTML = `
    ${governanceBlock}
    <div class="exec-toolbar">
      <span class="exec-label">Modo executivo</span>
      <select class="exec-select" onchange="setExecutivePriorityFilter(this.value)">
        <option value="ALL" ${executivePriorityFilter === 'ALL' ? 'selected' : ''}>P0/P1/P2: todos</option>
        <option value="P0" ${executivePriorityFilter === 'P0' ? 'selected' : ''}>Somente P0</option>
        <option value="P1" ${executivePriorityFilter === 'P1' ? 'selected' : ''}>Somente P1</option>
        <option value="P2" ${executivePriorityFilter === 'P2' ? 'selected' : ''}>Somente P2</option>
      </select>
      <button class="exec-toggle ${executiveOnlyHigh ? 'active' : ''}" onclick="toggleExecutiveOnlyHigh()">
        ${executiveOnlyHigh ? 'Impacto/Risco alto: ON' : 'Impacto/Risco alto: OFF'}
      </button>
    </div>
    <div class="exec-summary-grid">
      <div class="exec-summary-card">
        <div class="exec-summary-value">${totalFiltered}</div>
        <div class="exec-summary-label">Total filtrado</div>
      </div>
      <div class="exec-summary-card">
        <div class="exec-summary-value">${highImpactPct}%</div>
        <div class="exec-summary-label">Alto impacto</div>
      </div>
      <div class="exec-summary-card">
        <div class="exec-summary-value">${highRiskPct}%</div>
        <div class="exec-summary-label">Alto risco</div>
      </div>
    </div>
    ${showTrendCard ? renderPickupTrendCard() : ''}
    <div class="sprint-header">
      <span class="sprint-title">${s.title}</span>
      <span class="sprint-meta">${s.duration}</span>
    </div>
    <p class="sprint-desc">${s.desc}</p>
    <div class="tasks">${taskHtml || '<div class="exec-empty">Nenhuma historia encontrada para os filtros do modo executivo.</div>'}</div>
  `;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function resolveCustomerImpact(task) {
  if (task && task.impact) return String(task.impact).toUpperCase();
  if (String(task.priority || '').toUpperCase().includes('BLOQUEADOR')) return 'ALTO';
  if (String(task.priority || '').toUpperCase().includes('CRÍTICO')) return 'ALTO';
  if (String(task.type || '').toUpperCase() === 'ENGINE') return 'ALTO';
  if (String(task.priority || '').toUpperCase().includes('ALTO')) return 'MEDIO';
  return 'MEDIO';
}

function resolveOperationalRisk(task) {
  if (task && task.risk) return String(task.risk).toUpperCase();
  if (String(task.priority || '').toUpperCase().includes('BLOQUEADOR')) return 'ALTO';
  if (String(task.priority || '').toUpperCase().includes('CRÍTICO')) return 'ALTO';
  if (String(task.type || '').toUpperCase() === 'INFRA') return 'ALTO';
  if (String(task.type || '').toUpperCase() === 'ENGINE') return 'MEDIO';
  return 'MEDIO';
}

function resolveWcagConformance(task) {
  if (task && task.wcag) return String(task.wcag).toUpperCase();
  return 'AA';
}

function trendClass(val) {
  if (Number(val) > 0) return 'trend-up';
  if (Number(val) < 0) return 'trend-down';
  return 'trend-neutral';
}

function trendSignal(val) {
  if (Number(val) > 0) return '▲';
  if (Number(val) < 0) return '▼';
  return '■';
}

function renderPickupTrendCard() {
  const d = pickupCompareData;
  const calls = d ? Number(d.delta_calls_pct || 0).toFixed(2) : '0.00';
  const effective = d ? Number(d.delta_effective_calls_pct || 0).toFixed(2) : '0.00';
  const success = d ? Number(d.delta_success_rate_pct || 0).toFixed(2) : '0.00';
  const windowLabel = d ? `${d.period_from} → ${d.period_to}` : 'Sem dados carregados';
  return `
    <div class="trend-card">
      <div class="trend-title">Card executivo de tendencia — Pickup KPI (current vs previous)</div>
      <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:8px">${windowLabel}</div>
      <div class="trend-row">
        <div class="trend-kpi">
          <div class="trend-kpi-value ${trendClass(calls)}">${trendSignal(calls)} ${calls}%</div>
          <div class="trend-kpi-label">Delta de volume (calls)</div>
        </div>
        <div class="trend-kpi">
          <div class="trend-kpi-value ${trendClass(effective)}">${trendSignal(effective)} ${effective}%</div>
          <div class="trend-kpi-label">Delta de efetividade</div>
        </div>
        <div class="trend-kpi">
          <div class="trend-kpi-value ${trendClass(success)}">${trendSignal(success)} ${success} pp</div>
          <div class="trend-kpi-label">Delta de taxa de sucesso</div>
        </div>
      </div>
    </div>
  `;
}

async function loadPickupCompare() {
  try {
    const token = (window.localStorage.getItem('ops_token') || '').trim();
    if (!token) {
      return;
    }
    const resp = await fetch('/partners/ops/pickup-confirm/metrics/compare', {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!resp.ok) {
      return;
    }
    pickupCompareData = await resp.json();
    if (Number(currentSprint) === 6) {
      renderContent();
    }
  } catch (e) {
    // board permanece funcional mesmo sem endpoint/token
  }
}

renderTabs();
renderContent();
loadPickupCompare();
</script>
