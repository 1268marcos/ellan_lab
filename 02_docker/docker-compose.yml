# ============================================================================
# docker-compose.yml (Compose V2 - sem version)
# VERSÃO 2.1
# ============================================================================
# 
# Arquitetura CENTRAL simplificada:
# - Postgres CENTRAL (fonte da verdade)
# - Redis CENTRAL (cache/locks/fila leve)
# - Payment Gateway (sem dependência de backends legados)
# - Simuladores SP/PT via MQTT
#
# backend_runtime é agora o "cérebro" operacional multi-locker, responsável por:
# - Grenciar alocação de slots
# - Comunicar com lockers via MQTT
# - Sincronizar com o Postgres Central
# - Expor APIs para payment_gateway e outros serviços
#
# Serviço - URL - Finalidade:
# - Backend Runtime - http://localhost:8200 - API operacional dos lockers
# - Payment Gateway - http://localhost:8000 - Processamento de pagamentos
# - Order Pickup - http://localhost:8003 - Fluxo de retirada de pedidos
# - PGAdmin - http://localhost:5050 - Interface do banco de dados (usamos plugin no VS Code)
# 
# ============================================================================

networks:
  locker-network:
    name: locker_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

services:

  # =========================
  # POSTGRES CENTRAL
  # =========================
  postgres_central:
    image: postgis/postgis:15-3.4  # Mude de postgres:15 para postgis/postgis:15-3.4
    container_name: postgres_central
    restart: unless-stopped
    environment:
      POSTGRES_DB: locker_central
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      TZ: UTC
      # Variáveis adicionais para PostGIS
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
    ports:
      - "5435:5432"
    volumes:
      - ../03_data/postgres_central:/var/lib/postgresql/data
      - ./02_docker/postgres_central/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d locker_central"]
      # test: ["CMD-SHELL", "pg_isready -U admin -d locker_central && psql -U admin -d locker_central -c 'SELECT PostGIS_version();' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - locker-network

  # =========================
  # REDIS CENTRAL
  # =========================
  redis_central:
    image: redis:7
    container_name: redis_central
    restart: unless-stopped
    ports:
      - "6382:6379"
    volumes:
      - ../03_data/redis_central:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - locker-network

  # =========================
  # MQTT BROKER
  # =========================
  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt_broker
    restart: unless-stopped
    ports:
      - "1884:1883"
    volumes:
      - ../03_data/mqtt:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-W", "5"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - locker-network


  # =========================
  # BACKEND RUNTIME (multi-locker)
  # =========================
  backend_runtime:
    build:
      context: ../01_source/backend/runtime
      dockerfile: Dockerfile
    container_name: backend_runtime
    restart: unless-stopped
    ports:
      - "8200:8000"
    environment:
      DB_HOST: postgres_central
      DB_NAME: locker_central
      DB_USER: admin
      DB_PASS: admin123
      REDIS_HOST: redis_central

      APP_NAME: backend_runtime
      HOST: 0.0.0.0
      PORT: 8000
      INTERNAL_TOKEN: ${ORDER_INTERNAL_TOKEN}
      # INTERNAL_SERVICE_TOKEN: ${ORDER_INTERNAL_TOKEN}

      MQTT_HOST: mqtt_broker
      MQTT_PORT: 1883

      BACKUPS_DIR: /backups
      LOGS_DIR: /logs

      CENTRAL_POSTGRES_DSN: postgresql://admin:admin123@postgres_central:5432/locker_central
      EVENTS_DB_PATH: /data/sqlite/runtime/events.db
      LOG_HASH_SALT: ${LOG_HASH_SALT}

      RUNTIME_REGISTRY_CACHE_TTL_SEC: 5

      RUNTIME_APPLY_SCHEMA_ON_STARTUP: "true"
      RUNTIME_SYNC_ON_STARTUP: "true"
      RUNTIME_SYNC_PRUNE_MISSING_ON_STARTUP: "false"
      RUNTIME_FAIL_FAST_ON_STARTUP_ERROR: "true"

      TZ: UTC
    volumes:
      - ../03_data/sqlite:/data/sqlite
      - ../04_logs:/logs
      - ../05_backups:/backups
    depends_on:
      postgres_central:
        condition: service_healthy
      redis_central:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    networks:
      - locker-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


  # =========================
  # PAYMENT GATEWAY (sem backends legados)
  # =========================
  payment_gateway:
    build:
      context: ../01_source/payment_gateway
      dockerfile: Dockerfile
    container_name: payment_gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # ⚠️ BACKENDS LEGADOS REMOVIDOS - usar apenas Postgres Central
      # - BACKEND_SP=http://backend_sp:8000  # REMOVIDO
      # - BACKEND_PT=http://backend_pt:8000  # REMOVIDO

      # redis central
      - REDIS_HOST=redis_central
      - GATEWAY_REDIS_HOST=redis_central

      # mqtt
      - MQTT_HOST=mqtt_broker

      # timezone do container
      - TZ=UTC

      # sqlite local (resiliência)
      - GATEWAY_SQLITE_PATH=/data/sqlite/gateway/events.db

      # Postgres central
      - CENTRAL_POSTGRES_DSN=postgresql://admin:admin123@postgres_central:5432/locker_central

      # multi-locker registry central
      - LOCKER_REGISTRY_JSON=${LOCKER_REGISTRY_JSON:-}

      # compatibilidade legada opcional
      - DEFAULT_LOCKER_ID=${DEFAULT_LOCKER_ID:-}
      - LOCKER_ID_SP=${LOCKER_ID_SP:-}
      - LOCKER_ID_PT=${LOCKER_ID_PT:-}

      # antifraude
      - ANTIFRAUD_ACTIVE_PEPPER_VERSION=${ANTIFRAUD_ACTIVE_PEPPER_VERSION}
      - ANTIFRAUD_PEPPER_V1=${ANTIFRAUD_PEPPER_V1}
      - ANTIFRAUD_PEPPER_V2=${ANTIFRAUD_PEPPER_V2}

      - IDEMPOTENCY_TTL_SEC=86400
      - DEVICE_FP_VERSION=v1_web
      - LOG_HASH_SALT=${LOG_HASH_SALT}
      - ANTIFRAUD_PEPPER=${ANTIFRAUD_PEPPER}

      - MERCADOPAGO_ACCESS_TOKEN=${MERCADOPAGO_ACCESS_TOKEN}
      - STRIPE_SECRET_KEY_PT=${STRIPE_SECRET_KEY_PT}
      - STRIPE_SECRET_KEY_SP=${STRIPE_SECRET_KEY_SP}
      - LOG_DIR=/logs

      # runtime operacional multi-locker
      - LOCKER_RUNTIME_INTERNAL=http://backend_runtime:8000
      - LOCKER_RUNTIME_HEALTH_PATH=/health
      - LOCKER_RUNTIME_ALLOCATE_PATH=/locker/allocate
      - LOCKER_RUNTIME_COMMIT_PATH=/locker/allocations/{allocation_id}/commit
      - LOCKER_RUNTIME_RELEASE_PATH=/locker/allocations/{allocation_id}/release
      - LOCKER_RUNTIME_SLOTS_PATH=/locker/slots
      - LOCKER_RUNTIME_SLOT_PATH=/locker/slots/{slot}
      - LOCKER_RUNTIME_SET_SLOT_STATE_PATH=/locker/slots/{slot}/set-state
      - LOCKER_RUNTIME_OPEN_SLOT_PATH=/locker/slots/{slot}/open
      - LOCKER_RUNTIME_LIGHT_ON_PATH=/locker/slots/{slot}/light/on
      - LOCKER_RUNTIME_CATALOG_SKUS_PATH=/catalog/skus
      - LOCKER_RUNTIME_CATALOG_SKU_PATH=/catalog/skus/{sku_id}
      - LOCKER_RUNTIME_CATALOG_SLOTS_PATH=/catalog/slots

      - INTERNAL_SERVICE_TOKEN=${ORDER_INTERNAL_TOKEN}

    volumes:
      - ../03_data/sqlite:/data/sqlite
      - ../04_logs:/logs
      - ../05_backups:/backups
    depends_on:
      postgres_central:
        condition: service_healthy
      redis_central:
        condition: service_healthy
      mqtt:
        condition: service_healthy
      backend_runtime:
        condition: service_healthy
    networks:
      - locker-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 4 # 3
      start_period: 90s #60s

  # =========================
  # ORDER PICKUP SERVICE (sem backends legados)
  # =========================
  order_pickup_service:
    build:
      context: ../01_source/order_pickup_service
    container_name: order_pickup_service
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file:
      - ../01_source/order_pickup_service/.env
    environment:
      - TZ=UTC

      # ⚠️ BACKENDS LEGADOS REMOVIDOS
      # - BACKEND_SP_INTERNAL=http://backend_sp:8000  # REMOVIDO
      # - BACKEND_PT_INTERNAL=http://backend_pt:8000  # REMOVIDO

      # endpoint de preço 
      - BACKEND_PRICE_PATH_TEMPLATE=/catalog/skus/{sku_id}

      # gateway central
      - PAYMENT_GATEWAY_INTERNAL=http://payment_gateway:8000
      - PAYMENT_GATEWAY_LOCKERS_PATH_TEMPLATE=/lockers/{locker_id}

      # internal token
      - INTERNAL_TOKEN=${ORDER_INTERNAL_TOKEN}

      # QRCode
      - PICKUP_QR_SECRET=${PICKUP_QR_SECRET}
      - QR_ROTATE_SEC=${QR_ROTATE_SEC}

      # DB do serviço
      - DATABASE_URL=postgresql+psycopg2://admin:admin123@postgres_central:5432/locker_central

      # migração automática
      - RUN_DB_MIGRATIONS_ON_STARTUP=true

      # timeout do backend client
      - BACKEND_CLIENT_TIMEOUT_SEC=5

      # central
      - CENTRAL_POSTGRES_DSN=postgresql://admin:admin123@postgres_central:5432/locker_central

      # ambiente
      - NODE_ENV=${NODE_ENV:-development}

      # jobs internos
      - EXPIRY_POLL_SEC=60
      - LIFECYCLE_EVENTS_POLL_SEC=10

      # email smtp
      - FRONTEND_BASE_URL=http://localhost:5173

    # ⚠️ depends_on ajustado - REMOVIDOS backend_sp e backend_pt
    depends_on:
      postgres_central:
        condition: service_healthy
      payment_gateway:
        condition: service_healthy
      backend_runtime:
        condition: service_healthy
      order_lifecycle_service:
        condition: service_started
    networks:
      - locker-network

  # =========================
  # ORDER LIFECYCLE SERVICE
  # =========================
  order_lifecycle_service:
    build:
      context: ../01_source/backend/order_lifecycle_service
    container_name: order_lifecycle_service
    environment:
      SERVICE_NAME: order_lifecycle_service
      APP_ENV: dev
      LOG_LEVEL: INFO
      HOST: 0.0.0.0
      PORT: 8010
      INTERNAL_TOKEN: ${ORDER_INTERNAL_TOKEN}
      POSTGRES_HOST: postgres_central
      POSTGRES_PORT: 5432
      POSTGRES_DB: locker_central
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      PREPAYMENT_TIMEOUT_SECONDS: 90
      WORKER_POLL_INTERVAL_SECONDS: 5
      TZ: UTC
    ports:
      - "8010:8010"
    depends_on:
      postgres_central:
        condition: service_healthy
    networks:
      - locker-network

  # =========================
  # ORDER LIFECYCLE WORKER
  # =========================
  order_lifecycle_worker:
    build:
      context: ../01_source/backend/order_lifecycle_service
    container_name: order_lifecycle_worker
    command: ["python", "-m", "app.workers.prepayment_timeout_worker"]
    environment:
      SERVICE_NAME: order_lifecycle_service
      APP_ENV: dev
      LOG_LEVEL: INFO
      INTERNAL_TOKEN: ${ORDER_INTERNAL_TOKEN}
      POSTGRES_HOST: postgres_central
      POSTGRES_PORT: 5432
      POSTGRES_DB: locker_central
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      PREPAYMENT_TIMEOUT_SECONDS: 90
      WORKER_POLL_INTERVAL_SECONDS: 5
      TZ: UTC
    depends_on:
      postgres_central:
        condition: service_healthy
    networks:
      - locker-network

  # =========================
  # BILLING FISCAL SERVICE
  # =========================
  billing_fiscal_service:
    build:
      context: ../01_source/backend/billing_fiscal_service
    container_name: billing_fiscal_service
    environment:
      SERVICE_NAME: billing_fiscal_service
      APP_ENV: dev
      LOG_LEVEL: INFO
      INTERNAL_TOKEN: ${ORDER_INTERNAL_TOKEN}
      HOST: 0.0.0.0
      PORT: 8020
      POSTGRES_HOST: postgres_central
      POSTGRES_PORT: 5432
      POSTGRES_DB: locker_central
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      ORDER_PICKUP_SERVICE_URL: http://order_pickup_service:8003
      ORDER_PICKUP_TIMEOUT_SEC: 5
      INVOICE_ISSUE_POLL_SEC: 5
      INVOICE_ISSUE_BATCH_SIZE: 50
      INVOICE_ISSUE_MAX_RETRIES: 5
      INVOICE_ISSUE_BASE_BACKOFF_SEC: 15
      INVOICE_ISSUE_PROCESSING_TIMEOUT_SEC: 180
      INVOICE_ISSUE_WORKER_ID: billing_fiscal_issue_worker
      TZ: UTC
    ports:
      - "8020:8020"
    depends_on:
      postgres_central:
        condition: service_healthy
      order_pickup_service:
        condition: service_started
    networks:
      - locker-network

  # =========================
  # BILLING FISCAL ISSUE WORKER
  # =========================
  billing_fiscal_issue_worker:
    build:
      context: ../01_source/backend/billing_fiscal_service
    container_name: billing_fiscal_issue_worker
    command: ["python", "-m", "app.workers.invoice_issue_worker"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: billing_fiscal_service
      APP_ENV: dev
      LOG_LEVEL: INFO
      INTERNAL_TOKEN: ${ORDER_INTERNAL_TOKEN}
      HOST: 0.0.0.0
      PORT: 8020
      POSTGRES_HOST: postgres_central
      POSTGRES_PORT: 5432
      POSTGRES_DB: locker_central
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      ORDER_PICKUP_SERVICE_URL: http://order_pickup_service:8003
      ORDER_PICKUP_TIMEOUT_SEC: 5
      INVOICE_ISSUE_POLL_SEC: 5
      INVOICE_ISSUE_BATCH_SIZE: 50
      INVOICE_ISSUE_MAX_RETRIES: 5
      INVOICE_ISSUE_BASE_BACKOFF_SEC: 15
      INVOICE_ISSUE_PROCESSING_TIMEOUT_SEC: 180
      INVOICE_ISSUE_WORKER_ID: billing_fiscal_issue_worker
      TZ: UTC
    depends_on:
      postgres_central:
        condition: service_healthy
      billing_fiscal_service:
        condition: service_started
      order_pickup_service:
        condition: service_started
    networks:
      - locker-network

  # =========================
  # BILLING FISCAL EVENT WORKER
  # =========================
  billing_fiscal_event_worker:
    build:
      context: ../01_source/backend/billing_fiscal_service
    container_name: billing_fiscal_event_worker
    command: ["python", "-m", "app.workers.invoice_event_worker"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: billing_fiscal_service
      APP_ENV: dev
      LOG_LEVEL: INFO
      INTERNAL_TOKEN: ${ORDER_INTERNAL_TOKEN}
      POSTGRES_HOST: postgres_central
      POSTGRES_PORT: 5432
      POSTGRES_DB: locker_central
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      ORDER_PICKUP_SERVICE_URL: http://order_pickup_service:8003
      ORDER_PICKUP_TIMEOUT_SEC: 5
      INVOICE_EVENT_WORKER_POLL_SEC: 10
      INVOICE_EVENT_WORKER_BATCH_SIZE: 100
      INVOICE_ISSUE_MAX_RETRIES: 5
      INVOICE_ISSUE_BASE_BACKOFF_SEC: 15
      INVOICE_ISSUE_PROCESSING_TIMEOUT_SEC: 180
      INVOICE_ISSUE_WORKER_ID: billing_fiscal_event_worker
      TZ: UTC
    depends_on:
      postgres_central:
        condition: service_healthy
      billing_fiscal_service:
        condition: service_started
      order_pickup_service:
        condition: service_started
    networks:
      - locker-network

  # =========================
  # ORDER PICKUP DOMAIN EVENT WORKER
  # =========================
  order_pickup_domain_event_worker:
    build:
      context: ../01_source/order_pickup_service
    container_name: order_pickup_domain_event_worker
    command: ["python", "-m", "app.workers.domain_event_outbox_worker"]
    restart: unless-stopped
    env_file:
      - ../01_source/order_pickup_service/.env
    environment:
      - TZ=UTC
      - INTERNAL_TOKEN=${ORDER_INTERNAL_TOKEN}
      - DATABASE_URL=postgresql+psycopg2://admin:admin123@postgres_central:5432/locker_central
      - LIFECYCLE_SERVICE_URL=http://order_lifecycle_service:8010
      - DOMAIN_EVENT_OUTBOX_POLL_SEC=5
      - DOMAIN_EVENT_OUTBOX_BATCH_SIZE=50
    depends_on:
      postgres_central:
        condition: service_healthy
      order_lifecycle_service:
        condition: service_started
      order_pickup_service:
        condition: service_started
    networks:
      - locker-network

  # =========================
  # ORDER PICKUP NOTIFICATION DELIVERY WORKER
  # =========================
  notification_delivery_worker:
    build:
      context: ../01_source/order_pickup_service
      dockerfile: Dockerfile
    container_name: notification_delivery_worker
    command: ["python", "-m", "app.workers.notification_delivery_worker"]
    restart: unless-stopped
    env_file:
      - ../01_source/order_pickup_service/.env
    environment:
      - TZ=UTC
      - DATABASE_URL=postgresql+psycopg2://admin:admin123@postgres_central:5432/locker_central
      - RUN_DB_MIGRATIONS_ON_STARTUP=true
      - FRONTEND_BASE_URL=http://localhost:5173
    volumes:
      - ../01_source/order_pickup_service/app:/app/app
    depends_on:
      order_pickup_service:
        condition: service_started
    networks:
      - locker-network

  # =========================
  # ORDER LIFECYCLE PICKUP TIMEOUT WORKER
  # =========================
  order_lifecycle_pickup_worker:
    build:
      context: ../01_source/backend/order_lifecycle_service
    container_name: order_lifecycle_pickup_worker
    command: ["python", "-m", "app.workers.pickup_timeout_worker"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: order_lifecycle_service
      APP_ENV: dev
      LOG_LEVEL: INFO
      INTERNAL_TOKEN: ${ORDER_INTERNAL_TOKEN}
      POSTGRES_HOST: postgres_central
      POSTGRES_PORT: 5432
      POSTGRES_DB: locker_central
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      PREPAYMENT_TIMEOUT_SECONDS: 90
      WORKER_POLL_INTERVAL_SECONDS: 5
      TZ: UTC
    depends_on:
      postgres_central:
        condition: service_healthy
      order_lifecycle_service:
        condition: service_started
    networks:
      - locker-network
      

  # =========================
  # SIMULATOR BACKEND RUNTIME
  # =========================
  simulator_backend_runtime:
    build:
      context: ../01_source/simulator
    container_name: simulator_backend_runtime
    restart: unless-stopped
    environment:
      MQTT_HOST: mqtt_broker
      MQTT_PORT: "1883"
      REGION: PT
      # LOCKER_ID: LOCKER_PT_01
      # MACHINE_ID: CACIFO-PT-001
      # compatibilidade legada opcional - deverá ser abandonada
      LOCKER_ID: ${DEFAULT_LOCKER_ID:-}
      LOCKER_ID_SP: ${LOCKER_ID_SP:-}
      LOCKER_ID_PT: ${LOCKER_ID_PT:-}
      MACHINE_ID: CACIFO-PT-001
      MACHINE_ID_SP: CACIFO-SP-001
      MACHINE_ID_PT: CACIFO-PT-001

      FAILURE_RATE: "0.09"
      PAYMENT_TRIGGERS_OPEN: "false"
      TZ: UTC
      DEBUG_LOGS: "true"
    depends_on:
      mqtt:
        condition: service_healthy
    networks:
      - locker-network


  # =========================
  # PGADMIN - Interface Web gráfica (provisório na fase desenvolvimento)
  # Como usar?   http://localhost:5050 e configure a conexão com postgres_central (hostname do container)
  # =========================
  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@admin.com
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #     PGADMIN_CONFIG_SERVER_MODE: 'False'
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #   - postgres_central
  #   networks:
  #     - locker-network